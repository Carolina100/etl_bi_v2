# ============================================================================
# PROFILE EXEMPLO DO DBT
#
# LOCAL:
# - mantenha um unico .env na raiz do projeto
# - antes de rodar dbt, carregue essas variaveis no terminal
#
# PRODUCAO:
# - essas mesmas variaveis devem vir do ambiente
# - Kubernetes / Airflow / secret manager devem injetar os valores
# ============================================================================

etl_bi_dbt:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      private_key_passphrase: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PASSPHRASE', '') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE_DBT') }}"
      database: SOLIX_BI
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema: DW
      threads: 4
      client_session_keep_alive: false
      session_parameters:
        TIMEZONE: UTC
