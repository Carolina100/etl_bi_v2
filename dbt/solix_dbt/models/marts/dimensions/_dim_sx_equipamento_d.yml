version: 2

models:
  - name: dim_sx_equipamento_d
    description: "Dimensao DW de equipamentos alimentada a partir do DS."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ID_CLIENTE
              - CD_EQUIPAMENTO
    columns:
      - name: SK_EQUIPAMENTO
        description: "Surrogate key da dimensao."
        tests:
          - not_null
          - unique
      - name: ID_CLIENTE
        tests:
          - not_null
      - name: CD_EQUIPAMENTO
        tests:
          - not_null
      - name: DESC_EQUIPAMENTO
      - name: CD_MODELO_EQUIPAMENTO
      - name: DESC_MODELO_EQUIPAMENTO
      - name: CD_TIPO_EQUIPAMENTO
      - name: DESC_TIPO_EQUIPAMENTO
      - name: DESC_STATUS
      - name: TP_USO_EQUIPAMENTO
      - name: FG_ATIVO
        tests:
          - not_null
      - name: ETL_BATCH_ID
        tests:
          - not_null
      - name: BI_CREATED_AT
        tests:
          - not_null
      - name: BI_UPDATED_AT
        tests:
          - not_null
