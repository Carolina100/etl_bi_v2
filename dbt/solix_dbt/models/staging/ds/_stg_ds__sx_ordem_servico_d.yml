version: 2

models:
  - name: stg_ds__sx_ordem_servico_d
    description: "Staging da tabela DS de ordem de servico."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ID_CLIENTE
              - CD_ORDEM_SERVICO
    columns:
      - name: ID_CLIENTE
        tests:
          - not_null
      - name: CD_ORDEM_SERVICO
        tests:
          - not_null
      - name: CD_ORD_STATUS
        tests:
          - not_null
      - name: DT_CRIADO_EM
      - name: DT_ABERTURA
        tests:
          - not_null
      - name: DT_ENCERRAMENTO
      - name: DT_INICIO_EXEC
      - name: DT_TERMINO_EXEC
      - name: DT_INICIO_PLAN_EXEC
      - name: DT_TERMINO_PLAN_EXEC
      - name: DESC_OS
        tests:
          - not_null
      - name: DESC_ORD_STATUS
        tests:
          - not_null
      - name: VL_LATITUDE
      - name: VL_LONGITUDE
      - name: FG_ORIGEM
      - name: FG_STATUS
      - name: VL_ORDEM_SERVICO
      - name: TICKET_NUMBER
      - name: FG_ATIVO
        tests:
          - not_null
      - name: ETL_BATCH_ID
        tests:
          - not_null
      - name: BI_CREATED_AT
        tests:
          - not_null
      - name: BI_UPDATED_AT
        tests:
          - not_null
