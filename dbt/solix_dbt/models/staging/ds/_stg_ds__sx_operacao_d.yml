version: 2

models:
  - name: stg_ds__sx_operacao_d
    description: "Modelo staging da tabela DS SX_OPERACAO_D."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - ID_CLIENTE
            - CD_OPERACAO
    columns:
      - name: ID_CLIENTE
        tests:
          - not_null
      - name: CD_OPERACAO
        tests:
          - not_null
      - name: DESC_OPERACAO
      - name: CD_GRUPO_OPERACAO
      - name: DESC_GRUPO_OPERACAO
      - name: CD_GRUPO_PARADA
      - name: DESC_GRUPO_PARADA
      - name: FG_TIPO_OPERACAO
      - name: CD_PROCESSO_TALHAO
      - name: DESC_PROCESSO_TALHAO
      - name: ETL_BATCH_ID
        tests:
          - not_null
      - name: BI_CREATED_AT
        tests:
          - not_null
      - name: BI_UPDATED_AT
        tests:
          - not_null
