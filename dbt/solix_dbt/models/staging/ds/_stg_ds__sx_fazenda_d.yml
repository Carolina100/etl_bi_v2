version: 2

models:
  - name: stg_ds__sx_fazenda_d
    description: "Modelo staging da tabela DS SX_FAZENDA_D."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - ID_CLIENTE
            - CD_FAZENDA
            - CD_ZONA
            - CD_TALHAO
    columns:
      - name: ID_CLIENTE
        tests:
          - not_null
      - name: CD_FAZENDA
        tests:
          - not_null
      - name: CD_ZONA
        tests:
          - not_null
      - name: CD_TALHAO
        tests:
          - not_null
      - name: DESC_FAZENDA
      - name: DESC_TALHAO
      - name: AREA_TOTAL
      - name: DESC_PRODUTOR
      - name: ETL_BATCH_ID
        tests:
          - not_null
      - name: BI_CREATED_AT
        tests:
          - not_null
      - name: BI_UPDATED_AT
        tests:
          - not_null
