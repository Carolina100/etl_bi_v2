version: 2

models:
  - name: stg_ds__sx_frente_d
    description: "Staging da tabela DS de frentes."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ID_CLIENTE
              - CD_CORPORATIVO
              - CD_REGIONAL
              - CD_UNIDADE
              - CD_FRENTE
    columns:
      - name: ID_CLIENTE
        tests:
          - not_null
      - name: CD_CORPORATIVO
        tests:
          - not_null
      - name: CD_REGIONAL
        tests:
          - not_null
      - name: CD_UNIDADE
        tests:
          - not_null
      - name: CD_FRENTE
        tests:
          - not_null
      - name: DESC_CORPORATIVO
      - name: DESC_REGIONAL
      - name: DESC_UNIDADE
      - name: DESC_FRENTE
      - name: FG_FRENTE_TRABALHO
      - name: ETL_BATCH_ID
        tests:
          - not_null
      - name: BI_CREATED_AT
        tests:
          - not_null
      - name: BI_UPDATED_AT
        tests:
          - not_null
