version: 2

models:
  - name: stg_ds__sx_estado_d
    description: "Modelo staging da tabela DS SX_ESTADO_D."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ID_CLIENTE
              - CD_ESTADO
    columns:
      - name: ID_CLIENTE
        tests:
          - not_null
      - name: CD_ESTADO
        tests:
          - not_null
      - name: DESC_ESTADO
      - name: FG_ATIVO
        tests:
          - not_null
      - name: ETL_BATCH_ID
        tests:
          - not_null
      - name: BI_CREATED_AT
        tests:
          - not_null
      - name: BI_UPDATED_AT
        tests:
          - not_null
