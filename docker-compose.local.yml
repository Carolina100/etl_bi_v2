x-airflow-env: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
    AIRFLOW__API__SECRET_KEY: local-airflow-api-secret-key-change-me
    AIRFLOW__API_AUTH__JWT_SECRET: local-airflow-jwt-secret-key-change-me
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/dags
    AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW_PROJECT_ROOT: /opt/airflow/project
    PYTHONPATH: /opt/airflow/project
    DBT_PROFILES_DIR: /opt/airflow/project/dbt/solix_dbt

x-airflow-common: &airflow-common
  environment:
    <<: *airflow-env
  env_file:
    - .env.docker
  volumes:
    - .:/opt/airflow/project
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    command: >
      bash -c "
      airflow db migrate
      "
    restart: "no"

  airflow-apiserver:
    <<: *airflow-common
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    command: airflow api-server
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    command: airflow dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    command: airflow triggerer
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker-ds:
    <<: *airflow-common
    build:
      context: .
      dockerfile: infra/runtime/python/Dockerfile
    command: airflow celery worker -q ds
    environment:
      <<: *airflow-env
      ORACLE_CLIENT_LIB_DIR: /opt/oracle/instantclient_23_26
      SNOWFLAKE_PRIVATE_KEY_PATH: /opt/airflow/project/secrets/snowflake/ETL_KEYPAIR.p8
    depends_on:
      airflow-apiserver:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully

  airflow-worker-dbt:
    <<: *airflow-common
    build:
      context: .
      dockerfile: infra/runtime/dbt/Dockerfile
    command: airflow celery worker -q dbt
    environment:
      <<: *airflow-env
      SNOWFLAKE_PRIVATE_KEY_PATH: /opt/airflow/project/secrets/snowflake/ETL_KEYPAIR.p8
    depends_on:
      airflow-apiserver:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  airflow_logs:
